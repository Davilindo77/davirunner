<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Davi Jump | O Jogo</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2b;
            --accent: #4f46e5;
            --text: #ffffff;
        }
        body.light-mode {
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #4f46e5;
            --text: #1e293b;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
        }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0f1a; z-index: 1000; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
            transition: 0.5s;
        }
        .loading-bar { width: 150px; height: 4px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: var(--accent); animation: load 2s forwards; }
        @keyframes load { to { width: 100%; } }

        /* --- UI DO JOGO --- */
        #gameCanvas { display: block; background: var(--bg); }
        .ui-layer {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            pointer-events: none; z-index: 10;
        }
        .score-box { font-size: 24px; font-weight: 800; }
        
        #menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--card); padding: 30px;
            border-radius: 20px; border: 2px solid var(--accent); z-index: 20;
        }
        .btn {
            background: var(--accent); color: white; border: none;
            padding: 15px 30px; border-radius: 10px; font-weight: bold;
            font-size: 18px; cursor: pointer; margin-top: 15px;
        }
        .theme-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--card); border: 1px solid var(--accent);
            padding: 10px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color: white; letter-spacing: 5px;">DAVI JUMP</h1>
        <div class="loading-bar"><div class="progress"></div></div>
    </div>

    <div class="ui-layer">
        <div class="score-box">Pontos: <span id="currentScore">0</span></div>
        <div class="score-box">Recorde: <span id="highScore">0</span></div>
    </div>

    <div id="menu">
        <h2 id="menuTitle">DAVI JUMP</h2>
        <p id="lastScoreText"></p>
        <button class="btn" onclick="startGame()">JOGAR AGORA</button>
    </div>

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('currentScore');
    const highEl = document.getElementById('highScore');
    const menu = document.getElementById('menu');

    // Configurações do Jogo
    let daviImg = new Image();
    daviImg.src = '5021535940282886753.jpg'; // SUA FOTO AQUI

    let score = 0;
    let high = localStorage.getItem('daviHighScore') || 0;
    highEl.innerText = high;
    
    let gameActive = false;
    let gravity = 0.6;
    let jump = -10;
    
    let davi = { x: 50, y: 200, w: 60, h: 60, dy: 0 };
    let obstacles = [];
    let frame = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Controles
    function handleInput() {
        if (!gameActive) return;
        davi.dy = jump;
        if(navigator.vibrate) navigator.vibrate(20);
    }
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function startGame() {
        menu.style.display = 'none';
        score = 0;
        davi.y = 200;
        davi.dy = 0;
        obstacles = [];
        gameActive = true;
        scoreEl.innerText = score;
    }

    function gameOver() {
        gameActive = false;
        menu.style.display = 'block';
        document.getElementById('menuTitle').innerText = "VIXE, CAIU!";
        document.getElementById('lastScoreText').innerText = "Você fez " + score + " pontos";
        if (score > high) {
            high = score;
            localStorage.setItem('daviHighScore', high);
            highEl.innerText = high;
        }
    }

    function update() {
        if (!gameActive) return;

        frame++;
        davi.dy += gravity;
        davi.y += davi.dy;

        // Limites da tela
        if (davi.y + davi.h > canvas.height || davi.y < 0) {
            gameOver();
        }

        // Gerar obstáculos (Memes ruins/obstáculos)
        if (frame % 90 === 0) {
            let gap = 200;
            let pos = Math.random() * (canvas.height - gap - 100) + 50;
            obstacles.push({ x: canvas.width, y: 0, w: 50, h: pos });
            obstacles.push({ x: canvas.width, y: pos + gap, w: 50, h: canvas.height });
        }

        obstacles.forEach((obs, index) => {
            obs.x -= 5;
            // Colisão
            if (davi.x < obs.x + obs.w && davi.x + davi.w > obs.x &&
                davi.y < obs.y + obs.h && davi.y + davi.h > obs.y) {
                gameOver();
            }
            // Pontuar
            if (obs.x === 50) {
                score += 0.5; // Porque são dois canos por vez
                scoreEl.innerText = Math.floor(score);
            }
            // Limpar memória
            if (obs.x + obs.w < 0) obstacles.splice(index, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Davi (A foto)
        ctx.save();
        ctx.beginPath();
        // Deixa a foto redonda pra ficar engraçado
        ctx.arc(davi.x + davi.w/2, davi.y + davi.h/2, davi.w/2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(daviImg, davi.x, davi.y, davi.w, davi.h);
        ctx.restore();

        // Desenhar Obstáculos
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--accent');
        obstacles.forEach(obs => {
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 10);
            ctx.fill();
        });

        update();
        requestAnimationFrame(draw);
    }

    // RoundRect Polyfill
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            this.rect(x, y, w, h);
        };
    }

    // Esconder Splash
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
    }, 2500);

    draw();
</script>
</body>
</html>
