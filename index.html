<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Davi Jump | Nervoso</title>
    <style>
        :root { --bg: #0b0f1a; --accent: #ff4757; --text: #ffffff; }
        body.light-mode { --bg: #f8fafc; --accent: #e84118; --text: #1e293b; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }
        
        #gameCanvas { display: block; }
        
        .ui { position: absolute; top: 20px; width: 100%; text-align: center; color: var(--text); z-index: 10; pointer-events: none; font-weight: 900; font-size: 24px; text-shadow: 2px 2px 0px #000; }

        #menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(22, 27, 43, 0.95); padding: 40px; border-radius: 30px;
            text-align: center; z-index: 100; border: 4px solid var(--accent); color: white;
        }
        .btn { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }
    </style>
</head>
<body>

    <div class="ui">PONTOS: <span id="score">0</span> | RECORDE: <span id="high">0</span></div>

    <div id="menu">
        <h1 style="margin:0">DAVI JUMP</h1>
        <p id="msg">Toque para desviar das caras bravas!</p>
        <button class="btn" onclick="startGame()">COMEÇAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false;
    let score = 0;
    let highScore = localStorage.getItem('daviJumpScore') || 0;
    document.getElementById('high').innerText = highScore;

    // Carregar Imagem do Davi
    const daviImg = new Image();
    daviImg.src = '5021535940282886753.jpg';

    let davi = { x: 50, y: 300, w: 70, h: 70, dy: 0, gravity: 0.6, jump: -10 };
    let obstacles = [];
    let frame = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        davi.y = canvas.height / 2;
        davi.dy = 0;
        score = 0;
        obstacles = [];
        gameActive = true;
        document.getElementById('menu').style.display = 'none';
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('menu').style.display = 'block';
        document.getElementById('msg').innerText = "Fim de jogo! Fez " + Math.floor(score) + " pontos.";
        if(score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('daviJumpScore', highScore);
            document.getElementById('high').innerText = highScore;
        }
    }

    // Pulo
    const doJump = () => { if(gameActive) davi.dy = davi.jump; if(navigator.vibrate) navigator.vibrate(30); };
    window.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
    window.addEventListener('mousedown', doJump);

    function update() {
        if (!gameActive) return;

        frame++;
        davi.dy += davi.gravity;
        davi.y += davi.dy;

        if (davi.y + davi.h > canvas.height || davi.y < 0) gameOver();

        // Criar obstáculos
        if (frame % 80 === 0) {
            let gap = 220;
            let minH = 50;
            let maxH = canvas.height - gap - 100;
            let height = Math.random() * maxH + minH;
            obstacles.push({ x: canvas.width, y: 0, w: 60, h: height, type: 'top' });
            obstacles.push({ x: canvas.width, y: height + gap, w: 60, h: canvas.height, type: 'bottom' });
        }

        obstacles.forEach((obs, i) => {
            obs.x -= 6;

            // Colisão precisa
            if (davi.x < obs.x + obs.w && davi.x + davi.w > obs.x &&
                davi.y < obs.y + obs.h && davi.y + davi.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score += 0.5;
                document.getElementById('score').innerText = Math.floor(score);
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Davi
        ctx.save();
        ctx.beginPath();
        ctx.arc(davi.x + davi.w/2, davi.y + davi.h/2, davi.w/2, 0, Math.PI*2);
        ctx.closePath();
        ctx.clip();
        // Desenha a imagem. Se não carregar, desenha um emoji
        if (daviImg.complete) {
            ctx.drawImage(daviImg, davi.x, davi.y, davi.w, davi.h);
        } else {
            ctx.font = "50px serif";
            ctx.fillText("😎", davi.x, davi.y + 50);
        }
        ctx.restore();

        // Desenhar Obstáculos (Cara de Bravo)
        obstacles.forEach(obs => {
            // Desenha o corpo do obstáculo
            ctx.fillStyle = "#ff4757";
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 15);
            ctx.fill();
            
            // Desenha a carinha brava no meio do obstáculo
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            let faceY = obs.type === 'top' ? obs.h - 30 : obs.y + 40;
            ctx.fillText("😠", obs.x + 10, faceY);
        });

        update();
        requestAnimationFrame(draw);
    }

    // Polyfill para navegadores antigos
    if (!ctx.roundRect) ctx.roundRect = function(x,y,w,h,r) { this.rect(x,y,w,h); };

    draw();
</script>
</body>
</html>
