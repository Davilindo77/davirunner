<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Davi Jump | Ultra Edition</title>
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 27, 43, 0.9);
            --accent: #6366f1;
            --danger: #ff4757;
            --text: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
        }

        /* --- BACKGROUND PARALLAX --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* --- TELA INICIAL --- */
        #mainMenu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 200; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-card {
            background: var(--card); padding: 40px; border-radius: 40px;
            backdrop-filter: blur(20px); text-align: center;
            border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .profile-container {
            position: relative; width: 130px; height: 130px; margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%; height: 100%; border-radius: 35px;
            object-fit: cover; border: 4px solid var(--accent);
        }

        .highscore-badge {
            background: var(--accent); color: white; padding: 6px 15px;
            border-radius: 50px; font-size: 12px; font-weight: 800;
            display: inline-block; margin-bottom: 20px;
        }

        .btn-start {
            background: var(--accent); color: white; border: none;
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 1.3rem; font-weight: 900; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-start:active { transform: scale(0.95); }

        /* --- GAME UI --- */
        #gameCanvas { display: none; cursor: pointer; }
        .hud {
            position: absolute; top: 30px; width: 100%;
            display: none; justify-content: space-around;
            pointer-events: none; z-index: 100; font-weight: 900;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="mainMenu">
        <div class="hero-card">
            <div class="profile-container">
                <img src="5021535940282886753.jpg" class="profile-img">
            </div>
            <h1 style="margin:0; font-size: 2.2rem;">DAVI JUMP</h1>
            <div class="highscore-badge">RECORDE: <span id="highText">0</span></div>
            <button class="btn-start" onclick="play()">JOGAR</button>
        </div>
    </div>

    <div class="hud" id="hud">
        <div style="font-size: 24px;">SCORE: <span id="scoreText">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    
    let highScore = localStorage.getItem('daviJumpScore') || 0;
    document.getElementById('highText').innerText = highScore;

    const daviImg = new Image();
    daviImg.src = '5021535940282886753.jpg';

    let gameActive = false;
    let score = 0;
    let davi = { x: 70, y: 0, w: 65, h: 65, dy: 0, gravity: 0.55, jump: -9 };
    let obstacles = [];
    let particles = [];
    let frame = 0;

    function init() {
        bgCanvas.width = canvas.width = window.innerWidth;
        bgCanvas.height = canvas.height = window.innerHeight;
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }
    }
    window.addEventListener('resize', init);
    init();

    function play() {
        document.getElementById('mainMenu').style.transform = 'translateY(-100%)';
        canvas.style.display = 'block';
        document.getElementById('hud').style.display = 'flex';
        reset();
    }

    function reset() {
        davi.y = canvas.height/2; davi.dy = 0;
        score = 0; obstacles = []; frame = 0;
        gameActive = true;
        document.getElementById('scoreText').innerText = "0";
    }

    function die() {
        gameActive = false;
        if(score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('daviJumpScore', highScore);
            document.getElementById('highText').innerText = highScore;
        }
        document.getElementById('mainMenu').style.transform = 'translateY(0)';
        document.querySelector('h1').innerText = "GAME OVER";
    }

    function jump() {
        if(gameActive) {
            davi.dy = davi.jump;
            if(navigator.vibrate) navigator.vibrate(20);
        }
    }
    window.addEventListener('mousedown', jump);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });

    function drawDavi() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(davi.x + davi.w/2, davi.y + davi.h/2, davi.w/2, 0, Math.PI*2);
        ctx.clip();
        if(daviImg.complete) {
            const scale = Math.max(davi.w / daviImg.width, davi.h / daviImg.height);
            const x = (davi.w - daviImg.width * scale) / 2;
            const y = (davi.h - daviImg.height * scale) / 2;
            ctx.drawImage(daviImg, davi.x + x, davi.y + y, daviImg.width * scale, daviImg.height * scale);
        }
        ctx.restore();
    }

    function loop() {
        // Background Parallax
        bgCtx.fillStyle = '#05070a';
        bgCtx.fillRect(0, 0, canvas.width, canvas.height);
        bgCtx.fillStyle = 'white';
        particles.forEach(p => {
            p.y += p.speed;
            if(p.y > canvas.height) p.y = 0;
            bgCtx.fillRect(p.x, p.y, p.size, p.size);
        });

        if(gameActive) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;
            davi.dy += davi.gravity;
            davi.y += davi.dy;

            if(davi.y + davi.h > canvas.height || davi.y < 0) die();

            if(frame % 95 === 0) {
                let gap = 210;
                let h = Math.random() * (canvas.height - gap - 160) + 80;
                obstacles.push({ x: canvas.width, y: 0, w: 70, h: h, type: 't' });
                obstacles.push({ x: canvas.width, y: h + gap, w: 70, h: canvas.height, type: 'b' });
            }

            obstacles.forEach((o, i) => {
                o.x -= 5.5;
                // Colisão
                if(davi.x < o.x + o.w && davi.x + davi.w > o.x && davi.y < o.y + o.h && davi.y + davi.h > o.y) die();
                
                // Desenho Obstáculo
                ctx.fillStyle = "#6366f1";
                ctx.beginPath();
                if(ctx.roundRect) ctx.roundRect(o.x, o.y, o.w, o.h, 15); else ctx.rect(o.x, o.y, o.w, o.h);
                ctx.fill();
                ctx.font = "30px Arial";
                ctx.fillText("😠", o.x + 18, o.type === 't' ? o.h - 30 : o.y + 45);

                if(o.x + o.w < 0) { 
                    obstacles.splice(i, 1); 
                    score += 0.5; 
                    document.getElementById('scoreText').innerText = Math.floor(score);
                }
            });
            drawDavi();
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
