<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davi Jump | Pro Edition</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #0a0a1a; font-family: 'Arial Black', sans-serif;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            color: white; pointer-events: none;
            text-shadow: 2px 2px #000;
        }

        .game-over {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); padding: 40px;
            border-radius: 30px; border: 4px solid #6366f1;
            text-align: center; color: white; display: none;
        }

        button {
            background: #6366f1; border: none; padding: 15px 30px;
            color: white; font-weight: bold; border-radius: 15px;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div style="font-size: 24px;">SCORE: <span id="score">0</span></div>
        <div style="font-size: 14px; color: #10b981;">HI-SCORE: <span id="hiscore">0</span></div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1>FIM DE JOGO!</h1>
        <p>Você sobreviveu por <span id="finalScore">0</span> pontos.</p>
        <button onclick="resetGame()">TENTAR NOVAMENTE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Configurações
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let hiScore = localStorage.getItem('daviHiScore') || 0;
    document.getElementById('hiscore').innerText = hiScore;
    
    let gameActive = true;
    let frame = 0;

    // Carregar Imagem
    const daviImg = new Image();
    daviImg.src = 'foto.jpg';

    // Estado do Jogador
    const player = {
        x: 100,
        y: canvas.height - 150,
        w: 70,
        h: 70,
        dy: 0,
        jumpForce: 15,
        gravity: 0.6,
        grounded: false,
        rotation: 0
    };

    let obstacles = [];
    let particles = [];

    // Partículas de "Rastro"
    function createParticle(x, y, color) {
        for(let i=0; i<5; i++) {
            particles.push({
                x: x, y: y,
                vx: Math.random() * -5 - 2,
                vy: Math.random() * 2 - 1,
                life: 1.0,
                color: color
            });
        }
    }

    function update() {
        if (!gameActive) return;

        // Gravidade e Pulo
        player.dy += player.gravity;
        player.y += player.dy;

        const groundLevel = canvas.height - 100 - player.h;
        if (player.y > groundLevel) {
            player.y = groundLevel;
            player.dy = 0;
            player.grounded = true;
            player.rotation = 0;
        }

        // Rotação no ar
        if (!player.grounded) {
            player.rotation += 0.1;
        }

        // Gerar Obstáculos (Dificuldade aumenta com o tempo)
        if (frame % Math.max(30, 90 - Math.floor(score/100)) === 0) {
            obstacles.push({
                x: canvas.width,
                y: canvas.height - 100 - 50,
                w: 50,
                h: 50,
                speed: 7 + (score / 200)
            });
        }

        // Mover Obstáculos
        obstacles.forEach((obs, index) => {
            obs.x -= obs.speed;
            
            // Colisão
            if (player.x < obs.x + obs.w &&
                player.x + player.w > obs.x &&
                player.y < obs.y + obs.h &&
                player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        // Partículas
        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });

        frame++;
    }

    function draw() {
        // Fundo com Gradiente
        let grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grd.addColorStop(0, "#0a0a1a");
        grd.addColorStop(1, "#161b2b");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Desenhar Chão Futurista
        ctx.fillStyle = "#6366f1";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 2);
        ctx.fillStyle = "rgba(99, 102, 241, 0.1)";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        // Desenhar Partículas
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1;

        // Desenhar Obstáculos (Caras Bravas)
        ctx.fillStyle = "#ff4757";
        obstacles.forEach(obs => {
            ctx.beginPath();
            ctx.arc(obs.x + 25, obs.y + 25, 25, 0, Math.PI*2);
            ctx.fill();
            // Olhinhos bravos
            ctx.fillStyle = "white";
            ctx.fillRect(obs.x+10, obs.y+15, 8, 8);
            ctx.fillRect(obs.x+32, obs.y+15, 8, 8);
            ctx.fillStyle = "#ff4757";
        });

        // Desenhar Jogador (Davi)
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        ctx.rotate(player.rotation);
        
        // Brilho na foto
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#6366f1";

        // Clip circular para a foto
        ctx.beginPath();
        ctx.arc(0, 0, player.w/2, 0, Math.PI*2);
        ctx.clip();
        
        if (daviImg.complete) {
            ctx.drawImage(daviImg, -player.w/2, -player.h/2, player.w, player.h);
        } else {
            ctx.fillStyle = "white";
            ctx.fill();
        }
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    function gameOver() {
        gameActive = false;
        if (score > hiScore) {
            localStorage.setItem('daviHiScore', score);
        }
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOverScreen').style.display = 'block';
    }

    function resetGame() {
        score = 0;
        obstacles = [];
        particles = [];
        player.y = canvas.height - 150;
        gameActive = true;
        document.getElementById('score').innerText = "0";
        document.getElementById('gameOverScreen').style.display = 'none';
        frame = 0;
    }

    // Controles
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
            createParticle(player.x, player.y + player.h, "#6366f1");
        }
    });

    canvas.addEventListener('touchstart', () => {
        if (player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
            createParticle(player.x, player.y + player.h, "#6366f1");
        }
    });

    draw();
</script>
</body>
</html>
