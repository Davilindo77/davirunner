<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davi Jump | Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05070a; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            text-shadow: 2px 2px #000; pointer-events: none; z-index: 10;
        }
        .btn-voltar { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(99, 102, 241, 0.5); color: white; 
            padding: 12px 20px; border-radius: 15px; 
            text-decoration: none; font-weight: bold; border: 2px solid #6366f1;
            z-index: 10; transition: 0.3s;
        }
        .btn-voltar:hover { background: #6366f1; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-voltar">🏠 MENU</a>
    <div id="ui">
        <div style="font-size: 28px;">PONTOS: <span id="score">0</span></div>
        <div style="font-size: 14px; color: #10b981;">RECORDE: <span id="hiscore">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Variáveis do Jogo
    let score = 0;
    let hiScore = localStorage.getItem('daviHiScore') || 0;
    document.getElementById('hiscore').innerText = hiScore;
    let frame = 0;
    let gameActive = true;
    let obstacles = [];

    const daviImg = new Image();
    daviImg.src = 'foto.jpg';

    const player = {
        x: 80,
        y: 0,
        size: 80, // Tamanho fixo para o círculo
        dy: 0,
        jumpForce: 16,
        gravity: 0.8,
        grounded: false,
        rotation: 0
    };

    function drawPlayer() {
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation);

        // Brilho Neon
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#6366f1";

        // Círculo de Recorte (Impede de achatar)
        ctx.beginPath();
        ctx.arc(0, 0, player.size/2, 0, Math.PI * 2);
        ctx.clip();

        if (daviImg.complete) {
            // Lógica "Cover" para não achatar
            let imgRatio = daviImg.width / daviImg.height;
            let drawW, drawH;
            if (imgRatio > 1) {
                drawH = player.size;
                drawW = player.size * imgRatio;
            } else {
                drawW = player.size;
                drawH = player.size / imgRatio;
            }
            ctx.drawImage(daviImg, -drawW/2, -drawH/2, drawW, drawH);
        } else {
            ctx.fillStyle = "#6366f1";
            ctx.fill();
        }
        ctx.restore();
    }

    function createObstacle() {
        // Alterna entre obstáculos no chão e no ar
        const isAir = Math.random() > 0.7;
        obstacles.push({
            x: canvas.width,
            y: isAir ? canvas.height - 250 : canvas.height - 145,
            w: 50,
            h: 50,
            speed: 8 + (score / 150),
            color: isAir ? "#f59e0b" : "#ff4757"
        });
    }

    function update() {
        if(!gameActive) return;
        
        player.dy += player.gravity;
        player.y += player.dy;

        const floorY = canvas.height - 100 - player.size;
        if (player.y > floorY) {
            player.y = floorY;
            player.dy = 0;
            player.grounded = true;
            player.rotation = 0;
        } else {
            player.rotation += 0.1; // Gira no ar
        }

        // Criar obstáculos em ondas
        if (frame % 70 === 0) {
            createObstacle();
        }

        obstacles.forEach((obs, i) => {
            obs.x -= obs.speed;
            
            // Colisão Precisa
            if (player.x + 10 < obs.x + obs.w && 
                player.x + player.size - 10 > obs.x && 
                player.y + 10 < obs.y + obs.h && 
                player.y + player.size - 10 > obs.y) {
                
                gameActive = false;
                if(score > hiScore) localStorage.setItem('daviHiScore', score);
                alert("GAME OVER! Pontos: " + score);
                location.reload();
            }

            if(obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score += 10;
            }
        });
        frame++;
    }

    function draw() {
        // Fundo
        ctx.fillStyle = "#05070a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Chão Estiloso
        ctx.fillStyle = "#161b2b";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        ctx.fillStyle = "#6366f1";
        ctx.fillRect(0, canvas.height - 105, canvas.width, 5);

        // Obstáculos
        obstacles.forEach(obs => {
            ctx.shadowBlur = 15;
            ctx.shadowColor = obs.color;
            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 10);
            ctx.fill();
        });
        ctx.shadowBlur = 0;

        drawPlayer();
        update();
        document.getElementById('score').innerText = score;
        requestAnimationFrame(draw);
    }

    // Comandos
    const jumpAction = () => {
        if(player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    };

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jumpAction(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jumpAction(); });

    draw();
</script>
</body>
</html>
